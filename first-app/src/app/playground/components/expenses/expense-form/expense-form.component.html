<div class="backdrop">
  <div class="my-modal">
    <h4 class="text-center">
      {{ expense ? "Edit Expense" : "Add Your Expenses" }}
    </h4>

    <!-- form -->
    <form (submit)="onSubmit()" [formGroup]="expenseForm">
      <!-- title -->
      <div class="form-floating mb-3">
        <input
          type="text"
          class="form-control"
          name="title"
          id="title"
          placeholder=""
          formControlName="title"
        />
        <label for="title">Title</label>
      </div>

      <!-- amount -->
      <div class="form-floating mb-3">
        <input
          type="number"
          class="form-control"
          name="amount"
          id="amount"
          placeholder=""
          formControlName="amount"
        />
        <label for="amount">Amount</label>
      </div>

      <!-- createdAt -->
      <div class="form-floating mb-3">
        <input
          type="date"
          class="form-control"
          name="createdAt"
          id="createdAt"
          placeholder=""
          formControlName="createdAt"
        />
        <label for="createdAt">Date</label>
      </div>

      <!-- buttons - Add and Close -->
      <div class="row">
        <div class="col">
          <div class="d-grid">
            <button type="submit" [ngClass]="['btn', 'btn-dark']">
              {{ expense ? "Edit" : "Add" }}
            </button>
          </div>
        </div>
        <div class="col">
          <div class="d-grid">
            <button (click)="onClose()" type="button" class="btn btn-light">
              Close
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
